<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Insurance Claims Fraud Detection System — Predict whether an insurance claim is fraudulent using Machine Learning.">
    <title>Insurance Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo">🛡️</div>
                <button class="btn-predict-header" onclick="document.querySelector('form').scrollIntoView({behavior: 'smooth'})">🔍 Predict</button>
            </div>
            <h1>Insurance Fraud Detection</h1>
            <p class="subtitle">Enter claim details below to predict whether an insurance claim is <strong>Fraudulent</strong> or <strong>Genuine</strong>.</p>
        </header>

        <!-- Prediction Form -->
        <form action="/predict" method="POST" class="form-grid">

            <!-- ─── Policy Information ─── -->
            <div class="section">
                <h2 class="section-title">📋 Policy Information</h2>
                <div class="fields">
                    <div class="field">
                        <label for="months_as_customer">Months as Customer</label>
                        <input type="number" id="months_as_customer" name="months_as_customer" value="150" min="0" max="500">
                    </div>
                    <div class="field">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" value="35" min="18" max="80">
                    </div>
                    <div class="field">
                        <label for="policy_state">Policy State</label>
                        <select id="policy_state" name="policy_state">
                            <option value="OH">OH</option>
                            <option value="IN">IN</option>
                            <option value="IL">IL</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="policy_csl">Policy CSL</label>
                        <select id="policy_csl" name="policy_csl">
                            <option value="100/300">100/300</option>
                            <option value="250/500" selected>250/500</option>
                            <option value="500/1000">500/1000</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="policy_deductable">Policy Deductible ($)</label>
                        <input type="number" id="policy_deductable" name="policy_deductable" value="1000" step="500">
                    </div>
                    <div class="field">
                        <label for="policy_annual_premium">Annual Premium ($)</label>
                        <input type="number" id="policy_annual_premium" name="policy_annual_premium" value="1200" step="0.01">
                    </div>
                    <div class="field">
                        <label for="umbrella_limit">Umbrella Limit ($)</label>
                        <input type="number" id="umbrella_limit" name="umbrella_limit" value="0" step="1000000">
                    </div>
                </div>
            </div>

            <!-- ─── Insured Person ─── -->
            <div class="section">
                <h2 class="section-title">👤 Insured Person</h2>
                <div class="fields">
                    <div class="field">
                        <label for="insured_sex">Sex</label>
                        <select id="insured_sex" name="insured_sex">
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="insured_education_level">Education Level</label>
                        <select id="insured_education_level" name="insured_education_level">
                            <option value="High School">High School</option>
                            <option value="Associate">Associate</option>
                            <option value="College">College</option>
                            <option value="Masters">Masters</option>
                            <option value="PhD">PhD</option>
                            <option value="MD">MD</option>
                            <option value="JD">JD</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="insured_occupation">Occupation</label>
                        <select id="insured_occupation" name="insured_occupation">
                            <option value="exec-managerial">Executive / Managerial</option>
                            <option value="prof-specialty">Professional Specialty</option>
                            <option value="sales">Sales</option>
                            <option value="tech-support">Tech Support</option>
                            <option value="craft-repair">Craft Repair</option>
                            <option value="machine-op-inspct">Machine Operator</option>
                            <option value="adm-clerical">Admin Clerical</option>
                            <option value="transport-moving">Transport / Moving</option>
                            <option value="handlers-cleaners">Handlers / Cleaners</option>
                            <option value="farming-fishing">Farming / Fishing</option>
                            <option value="protective-serv">Protective Service</option>
                            <option value="priv-house-serv">Private House Service</option>
                            <option value="armed-forces">Armed Forces</option>
                            <option value="other-service">Other Service</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="insured_hobbies">Hobbies</label>
                        <select id="insured_hobbies" name="insured_hobbies">
                            <option value="reading">Reading</option>
                            <option value="exercise">Exercise</option>
                            <option value="hiking">Hiking</option>
                            <option value="golf">Golf</option>
                            <option value="camping">Camping</option>
                            <option value="chess">Chess</option>
                            <option value="movies">Movies</option>
                            <option value="kayaking">Kayaking</option>
                            <option value="sleeping">Sleeping</option>
                            <option value="board-games">Board Games</option>
                            <option value="dancing">Dancing</option>
                            <option value="polo">Polo</option>
                            <option value="basketball">Basketball</option>
                            <option value="video-games">Video Games</option>
                            <option value="paintball">Paintball</option>
                            <option value="yachting">Yachting</option>
                            <option value="skydiving">Skydiving</option>
                            <option value="cross-fit">CrossFit</option>
                            <option value="bungie-jumping">Bungee Jumping</option>
                            <option value="base-jumping">Base Jumping</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="insured_relationship">Relationship</label>
                        <select id="insured_relationship" name="insured_relationship">
                            <option value="husband">Husband</option>
                            <option value="wife">Wife</option>
                            <option value="own-child">Own Child</option>
                            <option value="unmarried">Unmarried</option>
                            <option value="not-in-family">Not in Family</option>
                            <option value="other-relative">Other Relative</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="capital-gains">Capital Gains ($)</label>
                        <input type="number" id="capital-gains" name="capital-gains" value="0">
                    </div>
                    <div class="field">
                        <label for="capital-loss">Capital Loss ($)</label>
                        <input type="number" id="capital-loss" name="capital-loss" value="0">
                    </div>
                </div>
            </div>

            <!-- ─── Incident Details ─── -->
            <div class="section">
                <h2 class="section-title">🚗 Incident Details</h2>
                <div class="fields">
                    <div class="field">
                        <label for="incident_type">Incident Type</label>
                        <select id="incident_type" name="incident_type">
                            <option value="Single Vehicle Collision">Single Vehicle Collision</option>
                            <option value="Multi-vehicle Collision">Multi-vehicle Collision</option>
                            <option value="Vehicle Theft">Vehicle Theft</option>
                            <option value="Parked Car">Parked Car</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="collision_type">Collision Type</label>
                        <select id="collision_type" name="collision_type">
                            <option value="Front Collision">Front Collision</option>
                            <option value="Rear Collision">Rear Collision</option>
                            <option value="Side Collision">Side Collision</option>
                            <option value="?">Unknown (?)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="incident_severity">Incident Severity</label>
                        <select id="incident_severity" name="incident_severity">
                            <option value="Minor Damage">Minor Damage</option>
                            <option value="Major Damage">Major Damage</option>
                            <option value="Total Loss">Total Loss</option>
                            <option value="Trivial Damage">Trivial Damage</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="authorities_contacted">Authorities Contacted</label>
                        <select id="authorities_contacted" name="authorities_contacted">
                            <option value="Police">Police</option>
                            <option value="Fire">Fire</option>
                            <option value="Ambulance">Ambulance</option>
                            <option value="Other">Other</option>
                            <option value="None">None</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="incident_state">Incident State</label>
                        <select id="incident_state" name="incident_state">
                            <option value="SC">SC</option>
                            <option value="NY">NY</option>
                            <option value="WV">WV</option>
                            <option value="VA">VA</option>
                            <option value="NC">NC</option>
                            <option value="PA">PA</option>
                            <option value="OH">OH</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="incident_hour_of_the_day">Incident Hour (0-23)</label>
                        <input type="number" id="incident_hour_of_the_day" name="incident_hour_of_the_day" value="12" min="0" max="23">
                    </div>
                    <div class="field">
                        <label for="number_of_vehicles_involved">Vehicles Involved</label>
                        <input type="number" id="number_of_vehicles_involved" name="number_of_vehicles_involved" value="1" min="1" max="4">
                    </div>
                    <div class="field">
                        <label for="property_damage">Property Damage</label>
                        <select id="property_damage" name="property_damage">
                            <option value="YES">Yes</option>
                            <option value="NO">No</option>
                            <option value="?">Unknown (?)</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="bodily_injuries">Bodily Injuries</label>
                        <input type="number" id="bodily_injuries" name="bodily_injuries" value="0" min="0" max="2">
                    </div>
                    <div class="field">
                        <label for="witnesses">Witnesses</label>
                        <input type="number" id="witnesses" name="witnesses" value="1" min="0" max="3">
                    </div>
                    <div class="field">
                        <label for="police_report_available">Police Report Available</label>
                        <select id="police_report_available" name="police_report_available">
                            <option value="YES">Yes</option>
                            <option value="NO">No</option>
                            <option value="?">Unknown (?)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ─── Claim & Vehicle ─── -->
            <div class="section">
                <h2 class="section-title">💰 Claim & Vehicle Details</h2>
                <div class="fields">
                    <div class="field">
                        <label for="total_claim_amount">Total Claim Amount ($)</label>
                        <input type="number" id="total_claim_amount" name="total_claim_amount" value="50000" step="100">
                    </div>
                    <div class="field">
                        <label for="injury_claim">Injury Claim ($)</label>
                        <input type="number" id="injury_claim" name="injury_claim" value="5000" step="100">
                    </div>
                    <div class="field">
                        <label for="property_claim">Property Claim ($)</label>
                        <input type="number" id="property_claim" name="property_claim" value="10000" step="100">
                    </div>
                    <div class="field">
                        <label for="vehicle_claim">Vehicle Claim ($)</label>
                        <input type="number" id="vehicle_claim" name="vehicle_claim" value="35000" step="100">
                    </div>
                    <div class="field">
                        <label for="auto_make">Auto Make</label>
                        <select id="auto_make" name="auto_make">
                            <option value="Toyota">Toyota</option>
                            <option value="Ford">Ford</option>
                            <option value="BMW">BMW</option>
                            <option value="Chevrolet">Chevrolet</option>
                            <option value="Honda">Honda</option>
                            <option value="Dodge">Dodge</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Mercedes">Mercedes</option>
                            <option value="Audi">Audi</option>
                            <option value="Saab">Saab</option>
                            <option value="Suburu">Suburu</option>
                            <option value="Volkswagen">Volkswagen</option>
                            <option value="Jeep">Jeep</option>
                            <option value="Accura">Accura</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="auto_year">Auto Year</label>
                        <input type="number" id="auto_year" name="auto_year" value="2010" min="1995" max="2015">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="submit-section">
                <button type="submit" class="btn-predict">
                    <span class="btn-icon">🔍</span>
                    Predict Fraud
                </button>
            </div>
        </form>

        <footer class="footer">
            <p>Insurance Claims Fraud Detection System &bull; Powered by Machine Learning</p>
        </footer>
    </div>
</body>
</html>
